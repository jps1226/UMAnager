<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UMAnager</title>
    <link rel="stylesheet" href="/static/style.css"> 
</head>
<body>

<div class="sidebar">
    <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 15px;">
        <h2 style="margin: 0; color: #1dd1a1;">🐎 UMAnager</h2>
        <span style="font-size: 10px; color: #666; font-weight: bold; letter-spacing: 1px;">V1.0</span>
    </div>
    
    <details class="sidebar-group" open>
        <summary>🔄 Race Database</summary>
        <div class="sidebar-group-content">
            
            <button class="btn-full" onclick="triggerScrape('new')" id="btn-new-race" style="background: #1dd1a1; color: black; font-weight: bold; border-color: #1dd1a1; font-size: 15px; padding: 10px;">🔍 Fetch Upcoming Races</button>
            
            <details style="margin-top: 10px; margin-bottom: 5px;">
                <summary style="font-size: 12px; color: #888; cursor: pointer; user-select: none;">⚙️ Advanced Tools</summary>
                <div style="margin-top: 10px; padding-top: 10px; border-top: 1px dotted #444;">
                    <button class="btn-full" style="font-size: 12px; padding: 6px;" onclick="triggerScrape('all')" id="btn-all-race">🔄 Force Full Re-Scrape</button>
                    <button class="btn-full" style="font-size: 12px; padding: 6px;" onclick="triggerPost('/api/cache/clear')">🗑️ Clear Cached Races</button>
                    <button class="btn-full btn-danger" style="font-size: 12px; padding: 6px;" onclick="triggerPost('/api/dict/wipe')">🚨 Reset Translation Memory</button>
                </div>
            </details>
            
            <div id="scrape-console" class="console-box" style="border-radius: 6px;"></div>
        </div>
    </details>

    <details class="sidebar-group" open>
        <summary>🎯 Pedigree Lists</summary>
        <div class="sidebar-group-content">
            <label style="font-size: 14px;">Add to list:</label>
            <select id="snipe-type" style="background:#262730; color:white; border:1px solid #444; padding:5px; margin-bottom: 5px; width: 100%;">
                <option value="favorites">⭐ Favorites</option>
                <option value="watchlist">👁️ Watchlist</option>
            </select>
            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <input type="text" id="snipe-url" placeholder="https://db.netkeiba.com/...">
                <button onclick="snipeHorse()">Add</button>
            </div>
            
            <div class="tab-bar" style="margin-bottom: 10px;">
                <button class="tab-btn active" onclick="switchSidebarTab('fav')">Favorites</button>
                <button class="tab-btn" onclick="switchSidebarTab('watch')">Watchlist</button>
            </div>
            
            <div id="side-tab-fav" class="tab-content active">
                <div id="list-fav" class="horse-list-container"></div>
            </div>
            <div id="side-tab-watch" class="tab-content">
                <div id="list-watch" class="horse-list-container"></div>
            </div>
        </div>
    </details>

    <details class="sidebar-group" open>
            <summary>⚙️ Auto-Pick Strategy</summary>
            <div class="sidebar-group-content" style="padding: 10px 15px;">
                <div style="font-size: 11px; color: #888; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; text-align: center;">
                    Mode: <span id="risk-label" style="color:#ff9f43;">Balanced (50)</span>
                </div>
                <input type="range" id="risk-slider" min="0" max="100" value="50" oninput="updateRiskLabel(this.value)">
                <div style="display: flex; justify-content: space-between; font-size: 10px; color: #666; margin-top: 5px; font-weight: bold;">
                    <span>SAFE / CHALK</span>
                    <span>CHAOS / VALUE</span>
                </div>
            </div>
        </details>
        
    <details class="sidebar-group" open>
            <summary>🏆 Weekend Top Picks</summary>
            <div class="sidebar-group-content" id="sidebar-top-picks">
                </div>
        </details>
</div>

<div class="main-content">
    <div class="top-sticky-bar">
        <div class="clock-container">
            <div class="clock-box">
                <div class="clock-label">JAPAN (JST)</div>
                <div class="clock-time" id="jst">--:--:--</div>
            </div>
            
            <div id="countdown-container" class="countdown-wrapper" style="display: none;">
                <div class="countdown-title">Next Race In</div>
                <div id="countdown-time" class="countdown-time">--:--:--</div>
                <div id="countdown-race" class="countdown-race">Loading...</div>
            </div>

            <div class="clock-box">
                <div class="clock-label">CENTRAL (CT)</div>
                <div class="clock-time" id="cst">--:--:--</div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #333; padding-bottom: 6px;">
            <div id="date-tabs" class="tab-bar" style="border-bottom: none; margin-bottom: 0;"></div>
            <div style="display: flex; align-items: center; gap: 10px;">
                
                <div class="search-container">
                    <input type="text" id="horse-search" placeholder="🔍 Search horse..." autocomplete="off" oninput="handleSearchInput()" onkeydown="handleSearchKey(event)">
                    <div id="search-suggestions" class="suggestions-box"></div>
                </div>

                <button onclick="showExportModal()" style="padding: 6px 12px; background: #1dd1a1; color: black; font-weight: bold; border-color: #1dd1a1;">📋 Export to OrePro</button>
                <button onclick="collapseVotedRaces()" style="padding: 6px 12px; background: #333; border-color: #555;">✅ Collapse Voted</button>
                <button onclick="toggleAllRaces()" style="padding: 6px 12px; background: #333; border-color: #555;">↕️ Toggle All Races</button>
            </div>
        </div>
    </div>
    
    <div id="schedules-container" class="scrollable-races"></div>
</div>
<div id="export-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="width: 800px; max-width: 95vw;">
        <div class="modal-header">
            <h3 style="margin: 0;">📋 OrePro Cheat Sheet</h3>
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="https://orepro.netkeiba.com/bet/race_list.html" target="_blank" style="background: #1dd1a1; color: black; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 14px;">🔗 Open OrePro</a>
                <button onclick="closeExportModal()" class="close-btn">✖</button>
            </div>
        </div>
        <div id="export-display"></div>
        <button onclick="closeExportModal()" class="btn-full" style="background: #333; color: white; margin-top: 15px;">Close</button>
    </div>
</div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
